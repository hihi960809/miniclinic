<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改密碼 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 400px; margin: 60px auto; padding: 20px; border: 1px solid #E2E8F0; border-radius: 8px; }
        h1 { color: #0F2443; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #334155; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #CBD5E1; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #14B8A6; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0D9488; }
        .error { color: #DC2626; font-size: 0.9em; margin-top: 5px; }
        .success { color: #059669; text-align: center; margin-bottom: 15px; }
        .back-link { text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <h1>修改密碼</h1>

    <div th:if="${message}" class="success" th:text="${message}"></div>
    
    <div th:if="${error}" class="error" style="text-align:center" th:text="${error}"></div>

    <form th:action="@{/password}" th:object="${pwdForm}" method="post">
        <div class="form-group">
            <label>舊密碼:</label>
            <input type="password" th:field="*{oldPassword}" required>
        </div>
        
        <div class="form-group">
            <label>新密碼 (至少 8 碼):</label>
            <input type="password" th:field="*{newPassword}" required>
            <div class="error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
        </div>
        
        <div class="form-group">
            <label>確認新密碼:</label>
            <input type="password" th:field="*{confirmPassword}" required>
        </div>
        
        <button type="submit">確認修改</button>
    </form>

    <div class="back-link">
        <a th:href="@{/dashboard}">← 返回 Dashboard</a>
    </div>
</body>
</html>
